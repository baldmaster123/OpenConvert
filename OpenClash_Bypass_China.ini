; OpenClash / subconverter template
; Purpose: bypass China mainland, split OpenAI and other AI services.
; Usage: set this file as "Remote Config" in OpenClash subscription conversion.
; Note: rules under rule/Clash are mixed Clash classical providers, not domain-only providers.
; Rule source: https://github.com/blackmatrix7/ios_rule_script

[custom]

; ===== Rulesets =====
; Direct README says this allowlist should be placed before ad-block rules.
ruleset=Direct,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml
ruleset=Direct,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Direct/Direct.yaml

; Advertising already includes AdvertisingLite, Hijacking, and Privacy.
ruleset=REJECT,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising_Classical.yaml

; AI services. Keep OpenAI isolated from other AI services. Gemini already includes BardAI.
ruleset=OpenAI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Anthropic/Anthropic.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Civitai/Civitai.yaml

; Streaming media. Put specific groups before GlobalMedia, which includes YouTube and YouTubeMusic.
ruleset=YouTube,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
ruleset=YouTube,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTubeMusic/YouTubeMusic.yaml
ruleset=Streaming,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix_Classical.yaml
ruleset=Streaming,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.yaml
ruleset=Streaming,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia_Classical.yaml

; Messaging and social.
ruleset=Telegram,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
ruleset=Social,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.yaml
ruleset=Social,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.yaml
ruleset=Social,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Instagram/Instagram.yaml

; Work, development, and vendors. GitHub stays before Microsoft because Microsoft excludes GitHub.
ruleset=Cisco,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Cisco/Cisco.yaml
ruleset=GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
ruleset=Microsoft,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
ruleset=Apple,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple_Classical.yaml
ruleset=Google,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml

; China mainland comes near the end so previous service-specific rules win.
ruleset=Direct,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml
ruleset=Direct,[]GEOIP,CN

; Common global proxy list and fallback.
ruleset=Proxy,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ProxyLite/ProxyLite.yaml
ruleset=Final,[]FINAL

; ===== Proxy groups =====
custom_proxy_group=Proxy`select`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=OpenAI`select`[]US`[]JP`[]SG`[]TW`[]Proxy`[]Auto`[]Fallback`(美|美国|US|United States|Japan|日本|JP|Singapore|新加坡|SG|Taiwan|台湾|台|TW)
custom_proxy_group=AI`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`.*
custom_proxy_group=YouTube`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`[]HK`.*
custom_proxy_group=Streaming`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`[]HK`.*
custom_proxy_group=Telegram`select`[]Proxy`[]Auto`[]Fallback`[]SG`[]HK`[]US`.*
custom_proxy_group=Social`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]HK`.*
custom_proxy_group=Cisco`select`[]Proxy`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=GitHub`select`[]Proxy`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxy`[]Auto`[]Fallback`.*
custom_proxy_group=Apple`select`[]DIRECT`[]Proxy`[]Auto`[]Fallback`.*
custom_proxy_group=Google`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`.*
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]Auto`[]Fallback`[]DIRECT

; Region groups. Adjust regexes if your provider uses unusual node names.
custom_proxy_group=HK`select`(港|香港|HK|Hong Kong)
custom_proxy_group=TW`select`(台|台湾|臺|TW|Taiwan)
custom_proxy_group=JP`select`(日|日本|JP|Japan)
custom_proxy_group=SG`select`(新|新加坡|狮城|SG|Singapore)
custom_proxy_group=US`select`(美|美国|US|United States|America)

enable_rule_generator=true
overwrite_original_rules=true
