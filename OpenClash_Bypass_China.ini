; OpenClash / subconverter template
; Purpose: bypass China mainland, split OpenAI and other AI services.
; Usage: set this file as "Remote Config" in OpenClash subscription conversion.
; Note: rules under rule/Clash are mixed Clash classical providers, not domain-only providers.
; Rule source: https://github.com/blackmatrix7/ios_rule_script
; CDN mirror: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master

[custom]

; ===== Rulesets =====
; Private and LAN traffic should always bypass proxy, even if remote rules fail to load.
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,169.254.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR6,::1/128,no-resolve
ruleset=DIRECT,[]IP-CIDR6,fc00::/7,no-resolve
ruleset=DIRECT,[]IP-CIDR6,fe80::/10,no-resolve
ruleset=DIRECT,[]DOMAIN-SUFFIX,local

; Direct README says this allowlist should be placed before ad-block rules.
ruleset=DIRECT,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.yaml,86400
ruleset=DIRECT,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Direct/Direct.yaml,86400

; Advertising already includes AdvertisingLite, Hijacking, and Privacy.
ruleset=REJECT,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Advertising/Advertising_Classical.yaml,86400

; AI services. Keep OpenAI isolated from other AI services. Gemini already includes BardAI.
ruleset=OpenAI,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml,86400
ruleset=AI,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Claude/Claude.yaml,86400
ruleset=AI,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Anthropic/Anthropic.yaml,86400
ruleset=AI,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.yaml,86400
ruleset=AI,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Copilot/Copilot.yaml,86400
ruleset=AI,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Civitai/Civitai.yaml,86400

; Streaming media. Put specific groups before GlobalMedia, which includes YouTube and YouTubeMusic.
ruleset=YouTube,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/YouTube/YouTube.yaml,86400
ruleset=YouTube,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/YouTubeMusic/YouTubeMusic.yaml,86400
ruleset=Streaming,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Netflix/Netflix_Classical.yaml,86400
ruleset=Streaming,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Disney/Disney.yaml,86400
ruleset=Streaming,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GlobalMedia/GlobalMedia_Classical.yaml,86400

; Messaging and social.
ruleset=Telegram,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Telegram/Telegram.yaml,86400
ruleset=Social,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Twitter/Twitter.yaml,86400
ruleset=Social,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Facebook/Facebook.yaml,86400
ruleset=Social,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Instagram/Instagram.yaml,86400

; Work, development, and vendors. GitHub stays before Microsoft because Microsoft excludes GitHub.
ruleset=Cisco,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Cisco/Cisco.yaml,86400
ruleset=GitHub,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GitHub/GitHub.yaml,86400
ruleset=Microsoft,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Microsoft/Microsoft.yaml,86400
ruleset=Apple,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Apple/Apple_Classical.yaml,86400
ruleset=Google,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Google/Google.yaml,86400

; China mainland comes near the end so previous service-specific rules win.
ruleset=DIRECT,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml,86400
ruleset=DIRECT,[]GEOIP,CN

; Common global proxy list and fallback.
ruleset=Proxy,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ProxyLite/ProxyLite.yaml,86400
ruleset=Final,[]FINAL

; ===== Proxy groups =====
custom_proxy_group=Proxy`select`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=OpenAI`select`[]US`[]JP`[]SG`[]TW`[]Proxy`[]Auto`[]Fallback`(美|美国|US|United States|Japan|日本|JP|Singapore|新加坡|SG|Taiwan|台湾|台|TW)
custom_proxy_group=AI`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`.*
custom_proxy_group=YouTube`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`[]HK`.*
custom_proxy_group=Streaming`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`[]HK`.*
custom_proxy_group=Telegram`select`[]Proxy`[]Auto`[]Fallback`[]SG`[]HK`[]US`.*
custom_proxy_group=Social`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]HK`.*
custom_proxy_group=Cisco`select`[]Proxy`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=GitHub`select`[]Proxy`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxy`[]Auto`[]Fallback`.*
custom_proxy_group=Apple`select`[]DIRECT`[]Proxy`[]Auto`[]Fallback`.*
custom_proxy_group=Google`select`[]Proxy`[]Auto`[]Fallback`[]US`[]JP`[]SG`[]TW`.*
custom_proxy_group=Final`select`[]Proxy`[]Auto`[]Fallback`[]DIRECT

; Region groups. Adjust regexes if your provider uses unusual node names.
custom_proxy_group=HK`select`(港|香港|HK|Hong Kong)
custom_proxy_group=TW`select`(台|台湾|臺|TW|Taiwan)
custom_proxy_group=JP`select`(日|日本|JP|Japan)
custom_proxy_group=SG`select`(新|新加坡|狮城|SG|Singapore)
custom_proxy_group=US`select`(美|美国|US|United States|America)

enable_rule_generator=true
overwrite_original_rules=true
